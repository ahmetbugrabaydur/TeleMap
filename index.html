<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleMap FRP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-panel">
        <div id="logo-container">
            <img src="TeleMapLogo.png" alt="TeleMap FRP"> 
        </div>

        <div id="action-buttons">
            <button class="btn-primary" onclick="document.getElementById('universalInput').click()">
                <span>📤</span> UPLOAD
            </button>
            <input type="file" id="universalInput" accept="image/*" style="display:none" onchange="handleUniversalUpload(event)">

            <button class="btn-success" onclick="manualSave()">
                <span>💾</span> SAVE
            </button>

            <button id="deleteModeBtn" class="btn-danger" onclick="toggleDeleteMode()">
                <span>✂️</span> DELETE
            </button>
        </div>
    </div>

    <!-- Modal for Upload Decision -->
    <div id="uploadModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>What do you want to upload?</h3>
            <p>Do you want to make the selected image a map or a token?</p>
            <div class="modal-buttons">
                <button class="btn-primary" onclick="processUpload('map')">🗺️ Map</button>
                <button class="btn-secondary" onclick="processUpload('token')">♟️ Token</button>
                <button class="btn-danger" onclick="closeUploadModal()">❌ Cancel</button>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
